<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Anh xin lỗi mặt trời nhỏ nhó!</title>
  </head>
  <body>
    <div class="background-hearts" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <main class="container">
      <section class="love-card">
        <p class="eyebrow">from anh with love</p>
        <div class="image-frame">
          <img
            class="cat-img"
            src="https://media.giphy.com/media/SVkhYVCi8fKPKvypi6/giphy.gif"
            alt="Picture of a cute cat"
          />
        </div>
        <p class="title">
          Mặt trời nhỏ của anh ơi choo anhh xinn lỗi nhóooo😭<br />
          <span>Bé hong chọn hoặc thoát là tha lỗi cho anh đó</span>
        </p>
        <div class="buttons">
          <button type="button" class="btn btn--yes">Em chấp nhận</button>
          <button type="button" class="btn btn--no">Không bao giờ</button>
        </div>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
